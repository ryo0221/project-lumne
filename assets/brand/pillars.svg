<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0A0A0A"/>
  
  <!-- Pillar 1: Logic -->
  <g transform="translate(250, 200)">
    <rect x="-0.5" y="-100" width="1" height="200" fill="white" fill-opacity="0.8"/>
    <text y="140" text-anchor="middle" fill="white" font-family="Helvetica, Arial, sans-serif" font-size="18" letter-spacing="0.2em">LOGIC</text>
    <text y="165" text-anchor="middle" fill="white" fill-opacity="0.4" font-family="Helvetica, Arial, sans-serif" font-size="12">Plain Text Structure</text>
  </g>

  <!-- Connection 1 -->
  <path d="M350 200H450" stroke="white" stroke-opacity="0.1" stroke-dasharray="4 4"/>

  <!-- Pillar 2: Intuition -->
  <g transform="translate(600, 200)">
    <circle r="80" fill="url(#pillar_moon_glow)"/>
    <text y="140" text-anchor="middle" fill="white" font-family="Helvetica, Arial, sans-serif" font-size="18" letter-spacing="0.2em">INTUITION</text>
    <text y="165" text-anchor="middle" fill="white" fill-opacity="0.4" font-family="Helvetica, Arial, sans-serif" font-size="12">Tactile Live Canvas</text>
  </g>

  <!-- Connection 2 -->
  <path d="M750 200H850" stroke="white" stroke-opacity="0.1" stroke-dasharray="4 4"/>

  <!-- Pillar 3: Memory -->
  <g transform="translate(950, 200)">
    <circle r="90" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
    <circle r="70" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
    <text y="140" text-anchor="middle" fill="white" font-family="Helvetica, Arial, sans-serif" font-size="18" letter-spacing="0.2em">MEMORY</text>
    <text y="165" text-anchor="middle" fill="white" fill-opacity="0.4" font-family="Helvetica, Arial, sans-serif" font-size="12">Immutable Time Machine</text>
  </g>

  <defs>
    <radialGradient id="pillar_moon_glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(80)">
      <stop stop-color="#FFEAD0" stop-opacity="0.9"/>
      <stop offset="0.6" stop-color="#D4A276" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#804D26" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>

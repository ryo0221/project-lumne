<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: The Absolute Obsidian Night -->
  <rect width="1024" height="1024" rx="220" fill="#0A0A0A"/>
  
  <!-- Memory: The Halo of Time -->
  <!-- Strengthened opacity to ensure visibility on mobile/social media -->
  <circle cx="512" cy="512" r="340" stroke="white" stroke-opacity="0.25" stroke-width="2"/>
  
  <!-- The Moon: Ethereal Amber Lume -->
  <circle cx="512" cy="512" r="180" fill="url(#moon_glow_perfect)"/>
  
  <!-- Logic: The Luminous Filament -->
  <!-- Slightly more opaque to cut through the darkness -->
  <rect x="511.5" y="140" width="1" height="744" fill="white" fill-opacity="0.8"/>

  <defs>
    <radialGradient id="moon_glow_perfect" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 512) rotate(90) scale(180)">
      <stop stop-color="#FFEAD0" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#D4A276" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#804D26" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
ext>
  <text x="1000" y="300" text-anchor="end" fill="white" fill-opacity="0.5" font-family="Helvetica, Arial, sans-serif" font-weight="300" font-size="16" letter-spacing="0.1em">THE ARCHITECTURE OF THOUGHT</text>

  <defs>
    <radialGradient id="header_moon_glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(100)">
      <stop stop-color="#FFEAD0" stop-opacity="0.9"/>
      <stop offset="0.6" stop-color="#D4A276" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#804D26" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
